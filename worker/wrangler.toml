name = "kaset-lastfm"
main = "src/index.js"
compatibility_date = "2024-12-01"

# Environment variables (set via `wrangler secret put`):
# - LASTFM_API_KEY: Last.fm API key
# - LASTFM_SHARED_SECRET: Last.fm shared secret
# - KOFI_VERIFICATION_TOKEN: Ko-fi webhook Verification Token (KasetPlus support)

# Ko-fi supporters store. Create once with:
#   wrangler kv namespace create SUPPORTERS
# then paste the printed id below.
[[kv_namespaces]]
binding = "SUPPORTERS"
id = "7d36ade9123847708dd327a22299d99a"

[observability]
enabled = true
